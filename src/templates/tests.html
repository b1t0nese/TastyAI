<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Готовые тесты - TastyAI</title>
  <link rel="stylesheet" href="static/css/styles-tests.css">
  <link rel="icon" href="static/images/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Хедер -->
  <header class="header">
    <div class="container flex h-16 items-center justify-between">
      <a href="/" class="flex items-center gap-2 animate-fade-in">
        <span class="text-2xl font-bold">
          <span class="text-tasty">Tasty</span><span>AI</span>
        </span>
      </a>
      
      <!-- Поисковая строка -->
      <div class="hidden md:flex relative max-w-sm items-center animate-fade-in">
        <input
          type="text"
          placeholder="Поиск тестов..."
          class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 pr-10"
        >
      </div>
      
      <!-- Навигация -->
      <nav class="hidden md:flex items-center gap-1 animate-fade-in">
        <a href="tests" class="nav-link text-tasty">Готовые тесты</a>
        <a href="create_test" class="nav-link">Создать тест</a>
        <a href="sign">
          <button class="ml-2 border-tasty text-tasty hover:bg-tasty hover:text-white btn btn-outline">
            {{ username }}
          </button>
        </a>
      </nav>
      
      <!-- Мобильное меню -->
      <button class="md:hidden menu-button">
        <span class="menu-icon">☰</span>
      </button>
    </div>
    
    <!-- Мобильное меню (скрыто по умолчанию) -->
    <div class="mobile-menu md:hidden animate-fade-in" style="display: none;">
      <div class="container py-4 flex flex-col gap-4">
        <input
          type="text"
          placeholder="Поиск тестов..."
          id="searchField"
          class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 pr-10"
        >
        
        <nav class="flex flex-col items-start gap-3">
          <a href="tests" class="text-lg font-medium text-tasty">Готовые тесты</a>
          <a href="create-test" class="text-lg font-medium">Создать тест</a>
          <a href="sign">
            <button class="w-full bg-tasty hover:bg-tasty-dark text-white btn btn-primary">
              {{ username }}
            </button>
          </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="flex-1">
    <section class="py-10">
      <div class="container px-4 md:px-6">
        <div class="mb-8 animate-fade-in">
          <h1 class="text-3xl md:text-4xl font-bold mb-4">Готовые тесты</h1>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      </div>
      <div class="pagination animate-fade-in">
        <div class="page-item">Ещё</div>
      </div>
    </section>
  </main>

  <script src="static/js/tests.js"></script>
</body>
</html>
