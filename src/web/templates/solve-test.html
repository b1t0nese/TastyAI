{% extends "base.html" %}

{% block title %}TastyAI - Прохождение теста{% endblock %}
{% block stylesheet %}<link rel="stylesheet" href="static/css/styles-solve-test.css">{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
  <main class="flex-1">
    <section class="py-8">
      <div class="container px-4 md:px-6">
        <div class="max-w-3xl mx-auto animate-fade-in">
          <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
              <h1 class="text-2xl font-bold name"></h1>
              <span class="text-sm bg-tasty text-white px-2 py-1 rounded-md direction" style="padding: 0.5vh"></span>
            </div>
            <p class="text-muted-foreground description"></p>
          </div>
          
          <!-- Прогресс и номер вопроса -->
          <div class="mb-6 progressdiv" style="display: none">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm font-medium question-counter"></span>
            </div>
            <div class="progress-container">
              <div class="progress-bar" style="width: 0%"></div>
            </div>
          </div>
          
          <!-- Контент теста -->
          <div class="bg-card rounded-lg shadow-md overflow-hidden questions_field">
            <div class="p-6">
              <div class="hero-image animate-scale-in">
                <img src="static/images/hero-image.svg" alt="TestIcon" class="w-full max-w-md mx-auto">
              </div>
              <button class="bg-tasty hover:bg-tasty-dark text-white btn btn-primary w-full mt-6 start-test">
                Начать тест
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="static/js/solve-test.js"></script>
{% endblock %}
